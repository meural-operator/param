# =============================================================================
# Ramanujan@Home — Conda Environment (Recommended)
# =============================================================================
# Creates a fully isolated 'curiosity' environment with all dependencies.
#
# CREATE:
#   conda env create -f environment.yml
#
# ACTIVATE:
#   conda activate curiosity
#
# UPDATE (after pulling new changes):
#   conda env update -f environment.yml --prune
# =============================================================================

name: curiosity
channels:
  - defaults

dependencies:
  # -- Python Runtime --
  - python=3.13

  # -- Everything else via pip (for consistency across platforms) --
  - pip
  - pip:
    # Core Mathematics & Numerics
    - mpmath==1.3.0
    - numpy>=2.0.0
    - scipy>=1.14.0
    - sympy>=1.13.0

    # Machine Learning & RL
    - scikit-learn>=1.5.0
    - gymnasium>=1.0.0
    - tensorboard>=2.16.0

    # Symbolic Regression
    - pysr>=1.0.0

    # Distributed Compute & Networking
    - requests>=2.31.0
    - pyrebase4>=4.8.0
    - firebase-admin>=6.5.0
    - google-cloud-firestore>=2.16.0

    # Search & Optimization
    - ortools>=9.8
    - pybloom_live>=4.0.0

    # Utilities
    - tqdm>=4.65.0
    - pyyaml>=6.0
    - semver>=3.0.0

    # PyTorch (CUDA 13.0 — change to cu124 for older GPUs)
    # To install CPU-only instead, remove these 3 lines and add:
    #   --extra-index-url https://download.pytorch.org/whl/cpu
    #   torch>=2.4.0
    #   torchvision>=0.19.0
    - --extra-index-url https://download.pytorch.org/whl/cu130
    - torch==2.10.0+cu130
    - torchvision==0.25.0+cu130
